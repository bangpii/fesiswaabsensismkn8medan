name: absensismkn8medan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Font & UI
  google_fonts: ^6.2.1
  flutter_feather_icons: ^2.0.0+1
  boxicons: ^2.1.3

  # State Management & Routing
  get: ^4.7.2

  # API / Backend Laravel
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # JSON helper
  intl: ^0.20.2

  # Animation modern
  animate_do: ^4.2.0
  lottie: ^3.3.1

  # Utility
  gap: ^3.0.1

  # Realtime Laravel Reverb / WebSocket
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoApp.png"
  min_sdk_android: 21

  # Adaptive icon Android
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logoApp.png"