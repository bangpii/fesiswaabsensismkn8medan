name: absensismkn8medan
description: "@BangPii"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Font & UI
  google_fonts: ^6.2.1
  flutter_feather_icons: ^2.0.0+1
  boxicons: ^2.1.3

  # State Management & Routing
  get: ^4.7.2

  # API / Backend Laravel
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # 🔥 TAMBAHAN (WAJIB)
  connectivity_plus: ^6.0.3   # cek koneksi
  logger: ^2.4.0              # logging clean

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # JSON helper
  intl: ^0.20.2

  # Animation modern
  animate_do: ^4.2.0
  lottie: ^3.3.1

  # Utility
  gap: ^3.0.1

  # Realtime Laravel Reverb / WebSocket
  web_socket_channel: ^3.0.3

  # Untuk Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  gallery_saver_plus: ^3.0.1
  path_provider: ^2.1.3

  camera: ^0.11.0+2
  mobile_scanner: ^5.2.3 

  flutter_map: ^8.1.1
  google_maps_flutter: ^2.12.3
  flutter_map_cancellable_tile_provider: ^3.1.0
  latlong2: ^0.9.1

  http: ^1.2.2
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoApp.png"
  min_sdk_android: 21

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logoApp.png"